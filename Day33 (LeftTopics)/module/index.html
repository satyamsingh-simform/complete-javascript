<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module</title>
    <script defer type="Module" src="./main.js"></script>
</head>
<body>
    <!-- 
     Why do we need type="module"?
        -It tells the environment to treat the file as an ES Module
        -Enables import/export syntax
        -Provides file-level scope
        -Prevents global pollution
        -Loads scripts in a deferred and optimized way
    
    -->
</body>
</html>

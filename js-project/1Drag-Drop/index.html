<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag n Drop</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="main.js"></script>
</head>
<body>
    <div class="container">
        <div class="left" id="left">
            <div class="box" draggable="true">item-1</div>
            <div class="box" draggable="true">item-2</div>
            <div class="box" draggable="true">item-3</div>
            <div class="box" draggable="true">item-4</div>
        </div>
        <div class="right" id="right"></div>
    </div>
</body>
</html>
